<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- High-end rounded icon canvas background -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bgGrad)" filter="url(#dropShadow)" />
  
  <!-- Subtle tech network lattice on background -->
  <g opacity="0.08">
    <circle cx="100" cy="100" r="40" stroke="#FFFFFF" stroke-width="2" fill="none" />
    <circle cx="412" cy="100" r="60" stroke="#FFFFFF" stroke-width="2" fill="none" />
    <circle cx="100" cy="412" r="80" stroke="#FFFFFF" stroke-width="2" fill="none" />
    <circle cx="412" cy="412" r="50" stroke="#FFFFFF" stroke-width="2" fill="none" />
    <line x1="100" y1="100" x2="412" y2="100" stroke="#FFFFFF" stroke-width="2" />
    <line x1="412" y1="100" x2="412" y2="412" stroke="#FFFFFF" stroke-width="2" />
    <line x1="100" y1="100" x2="100" y2="412" stroke="#FFFFFF" stroke-width="2" />
    <line x1="100" y1="412" x2="412" y2="412" stroke="#FFFFFF" stroke-width="2" />
  </g>

  <!-- Elegant Inner Gloss Shimmer overlay -->
  <path d="M 24,124 Q 150,80 300,140 T 488,60 L 488,24 L 24,24 Z" fill="#FFFFFF" opacity="0.06" />

  <!-- Academic Mortarboard Cap + Letter M Integrated Graphic -->
  <g filter="url(#dropShadow)" transform="translate(0, 10)">
    <!-- Top Diamond of Cap -->
    <polygon points="256,120 420,190 256,260 92,190" fill="url(#whiteGrad)" />
    <!-- Cap Under Layer (Thickness) -->
    <polygon points="256,132 400,194 256,256 112,194" fill="#E5E7EB" opacity="0.9" />

    <!-- Tassel Button on top -->
    <ellipse cx="256" cy="190" rx="10" ry="6" fill="url(#goldGrad)" />
    
    <!-- Tassel Cord and Tassel hanging down -->
    <path d="M 256,193 Q 200,200 176,236 Q 166,250 166,264" fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round" />
    <rect x="156" y="260" width="20" height="25" rx="4" fill="url(#goldGrad)" />
    
    <!-- Cap Base (Skull Cap part) shaped like an abstract 'M' structure -->
    <path d="M 160,240 
             L 160,330 
             Q 160,360 190,360 
             L 210,360 
             Q 230,360 240,340 
             L 256,310 
             L 272,340 
             Q 282,360 302,360 
             L 322,360 
             Q 352,360 352,330 
             L 352,240 
             L 312,247 
             L 312,320 
             Q 312,328 304,328 
             L 282,328 
             L 256,276 
             L 230,328 
             L 208,328 
             Q 200,328 200,320 
             L 200,247 Z" 
          fill="url(#whiteGrad)" />
  </g>

  <!-- Glowing Premium Badge Core Ring -->
  <rect x="36" y="36" width="440" height="440" rx="92" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.12" />
  
  <!-- Outer glowing accent dots -->
  <circle cx="256" cy="36" r="4" fill="#FBBF24" />
  <circle cx="256" cy="476" r="4" fill="#FBBF24" />
  <circle cx="36" cy="256" r="4" fill="#FBBF24" />
  <circle cx="476" cy="256" r="4" fill="#FBBF24" />
</svg>
